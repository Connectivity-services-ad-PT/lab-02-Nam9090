name: Check Lab 02 OpenAPI repo

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f README.md
          test -f openapi.yaml
          test -f campus-spectral.yaml
          test -f negotiation-log.md
          test -f package.json
          test -f scripts/install_lab02_cli.sh
          test -f scripts/lint_openapi.sh
          test -f scripts/mock_openapi.sh
          test -f scripts/test_mock_with_curl.sh
          test -f scripts/collect_session02_evidence.sh

      - name: Shell syntax check
        run: |
          bash -n scripts/install_lab02_cli.sh
          bash -n scripts/lint_openapi.sh
          bash -n scripts/mock_openapi.sh
          bash -n scripts/test_mock_with_curl.sh
          bash -n scripts/collect_session02_evidence.sh

      - name: Ensure no Word or PowerPoint documents are committed
        run: |
          if find . \( -iname "*.doc" -o -iname "*.docx" -o -iname "*.ppt" -o -iname "*.pptx" \) | grep -q .; then
            echo "Office documents are not allowed in the student repo."
            find . \( -iname "*.doc" -o -iname "*.docx" -o -iname "*.ppt" -o -iname "*.pptx" \)
            exit 1
          fi

      - name: Check OpenAPI version
        run: |
          grep -q "openapi: 3.1.0" openapi.yaml

      - name: Install Spectral and lint template
        run: |
          npm install -g @stoplight/spectral-cli@6.11.1
          spectral lint openapi.yaml --ruleset campus-spectral.yaml
