openapi: 3.1.0
info:
  title: Camera Stream Service - Smart Campus API
  description: |
    API cung cấp khả năng quản lý và truy xuất luồng dữ liệu video từ hệ thống Camera trong Smart Campus. 
    Hỗ trợ các dịch vụ AI Vision và Analytics kết nối để phân tích hình ảnh.
  version: 1.0.0
  contact:
    name: Trần Đình Nam (Nam9090)
    email: nam.nd.2026@campus.edu.vn

servers:
  - url: http://localhost:4010
    description: Mock Server phục vụ bài thực hành Lab 02

# Bổ sung tags toàn cục để sửa lỗi operation-tag-defined
tags:
  - name: Cameras
    description: Các API liên quan đến quản lý thiết bị Camera và truyền luồng video (Stream)

paths:
  /cameras:
    get:
      summary: Lấy danh sách Camera
      description: Trả về danh sách tất cả các camera đang hoạt động trong hệ thống Smart Campus để Consumer lựa chọn.
      operationId: getAllCameras
      tags:
        - Cameras
      responses:
        '200':
          description: Danh sách camera được lấy thành công.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Camera'
        '500':
          $ref: '#/components/responses/InternalError'

  /cameras/{cameraId}:
    parameters:
      - $ref: '#/components/parameters/cameraId'
    get:
      summary: Lấy chi tiết thông tin Camera
      description: Truy xuất thông tin cấu hình chi tiết phần cứng, vị trí lắp đặt và trạng thái hiện tại của một Camera cụ thể qua ID.
      operationId: getCameraById
      tags:
        - Cameras
      responses:
        '200':
          description: Thông tin chi tiết của Camera.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Camera'
        '404':
          $ref: '#/components/responses/NotFound'

  /cameras/{cameraId}/stream/start:
    post:
      summary: Khởi tạo luồng dữ liệu (Stream)
      description: Yêu cầu hệ thống thiết lập kết nối phần cứng và sinh mã URL truyền luồng trực tuyến (RTSP) phục vụ cho Consumer xử lý AI.
      operationId: startCameraStream
      tags:
        - Cameras
      parameters:
        - $ref: '#/components/parameters/cameraId'
      responses:
        '201':
          description: Khởi tạo phiên stream thành công.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamSession'
        '409':
          description: Xung đột - Camera đã đạt giới hạn kết nối hoặc đang bảo trì.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /cameras/{cameraId}/stream/stop:
    post:
      summary: Dừng luồng dữ liệu
      description: Gửi yêu cầu giải phóng phiên truyền luồng video hiện tại của camera nhằm mục đích tiết kiệm băng thông mạng của khu vực Campus.
      operationId: stopCameraStream
      tags:
        - Cameras
      parameters:
        - $ref: '#/components/parameters/cameraId'
      responses:
        '204':
          description: Đã dừng luồng và giải phóng tài nguyên thành công.
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    cameraId:
      name: cameraId
      in: path
      required: true
      description: Mã định danh duy nhất của Camera
      schema:
        type: string
        example: "cam-7790"

  schemas:
    Camera:
      type: object
      required:
        - id
        - name
        - status
      properties:
        id:
          type: string
          example: "cam-7790"
        name:
          type: string
          example: "Camera Khu Vực Sảnh A1"
        location:
          type: string
          example: "Zone A - Gate 1"
        status:
          type: string
          enum: [active, inactive, maintenance]
          example: "active"
        updated_at:
          type: [string, "null"]
          format: date-time
          example: "2026-05-20T10:00:00Z"

    StreamSession:
      type: object
      required:
        - session_id
        - stream_url
      properties:
        session_id:
          type: string
          example: "sess-abc-123"
        stream_url:
          type: string
          format: uri
          example: "rtsp://stream.smartcampus.vn/live/cam-7790"
        created_at:
          type: string
          format: date-time
          example: "2026-05-20T10:05:00Z"
        expires_at:
          type: [string, "null"]
          format: date-time
          example: null

    ErrorDetail:
      oneOf:
        - $ref: '#/components/schemas/GeneralError'
        - $ref: '#/components/schemas/ConnectivityError'
      discriminator:
        propertyName: error_type
        mapping:
          general: '#/components/schemas/GeneralError'
          connectivity: '#/components/schemas/ConnectivityError'

    GeneralError:
      type: object
      required: [type, title, status, detail, error_type]
      properties:
        error_type:
          type: string
          const: general
        type:
          type: string
          format: uri
          example: "https://api.smartcampus.vn/probs/bad-request"
        title:
          type: string
          example: "Yêu cầu không hợp lệ"
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: "Tham số gửi lên bị thiếu hoặc sai định dạng."
        instance:
          type: string
          example: "/cameras/invalid-id"

    ConnectivityError:
      type: object
      required: [type, title, status, detail, error_type]
      properties:
        error_type:
          type: string
          const: connectivity
        type:
          type: string
          format: uri
          example: "https://api.smartcampus.vn/probs/connection-failed"
        title:
          type: string
          example: "Lỗi kết nối phần cứng"
        status:
          type: integer
          example: 503
        detail:
          type: string
          example: "Không thể kết nối đến thiết bị Camera do sự cố đường truyền."
        instance:
          type: string
          example: "/cameras/cam-7790/stream/start"

  responses:
    NotFound:
      description: Không tìm thấy tài nguyên yêu cầu.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GeneralError'
    InternalError:
      description: Lỗi hệ thống nội bộ.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GeneralError'